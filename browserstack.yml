userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

buildName: "Saudemo E2E - ${BUILD_ID}"
projectName: "Saudemo-Automation"

browsers:
  - browser: chrome
    browser_version: latest
    os: Windows
    os_version: 11
  - browser: firefox
    browser_version: latest
    os: Windows
    os_version: 11
  - browser: safari
    browser_version: latest
    os: OS X
    os_version: Sonoma

testTimeout: 30000
parallelsPerPlatform: 1

browserstackLocal: false

debug: true
networkLogs: true
consoleLogs: verbose
video: true

testObservability: true
testObservabilityOptions:
  projectName: "Saudemo-Automation"
  buildName: "Saudemo E2E"
